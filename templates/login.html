<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AhSolution ERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --accent:     #1e325a;
            --bg-light:   #f4f7f9;
            --text-dark:  #1e293b;
            --text-muted: #64748b;
            --border:     #e2e8f0;
        }
        body {
            background-color: var(--bg-light);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08);
        }
        .btn-primary { background-color: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background-color: #162545; border-color: #162545; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,50,90,0.12); }
        .form-label-xs {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="/static/logo.png" alt="AhSolution Logo" style="height: 52px; margin-bottom: 32px;">

        <div class="fw-bold mb-1" style="color: var(--accent); font-size: 1.1rem;">Systemadgang</div>
        <div class="small mb-4" style="color: var(--text-muted);">Log ind for at tilgå dit ERP-system</div>

        {% if error %}
        <div class="alert py-2 mb-3 text-start" style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; font-size:0.85rem; border-radius:8px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label-xs">Brugernavn</label>
                <input type="text" name="username" class="form-control mt-1" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label-xs">Adgangskode</label>
                <input type="password" name="password" class="form-control mt-1" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Log ind</button>
        </form>

        <div class="mt-4">
            <a href="/" class="small text-decoration-none" style="color: var(--text-muted);">← Tilbage til forsiden</a>
        </div>
    </div>
</body>
</html>
